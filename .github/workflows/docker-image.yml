name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Test docker image
      run: docker build -t nstl-build . && docker run --rm nstl-build sh -c "cd /src/build && ctest --output-on-failure"
